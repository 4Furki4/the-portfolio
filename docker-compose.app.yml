services:
  app:
    image: ${APP_IMAGE:-furki4/the-portfolio:latest}
    container_name: portfolio-app-production
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file:
      - path: .env.pi
        required: false
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-3004}:3000"
