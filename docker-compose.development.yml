services:
  app-development:
    image: ${APP_IMAGE:-furki4/the-portfolio:development}
    container_name: portfolio-app-development
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file:
      - path: .env.development.pi
        required: false
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3005:3000"
